name: Build Test ZIP

on:
  workflow_run:
    workflows:
      - Tests
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: build-test-zip-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Test ZIP
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build ZIP
        run: npm run build:zip

      - name: Upload test ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: tsubakuro-test-build
          path: dist/tsubakuro.zip
          retention-days: 30

      - name: Get artifact URL and send webhook to n8n
        env:
          ARTIFACT_WEBHOOK_URL: ${{ secrets.ARTIFACT_WEBHOOK_URL }}
        run: |
          # artifact ID を取得
          ARTIFACT_ID=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts \
            | jq '.artifacts[0].id')
          
          # artifact のダウンロード URL を生成
          ARTIFACT_URL="https://api.github.com/repos/${{ github.repository }}/actions/artifacts/${ARTIFACT_ID}/zip"
          
          # n8n webhook に POST
          curl -X POST $ARTIFACT_WEBHOOK_URL \
            -H "Content-Type: application/json" \
            -d "{
              \"repository\": \"${{ github.repository }}\",
              \"run_id\": \"${{ github.run_id }}\",
              \"artifact_name\": \"tsubakuro-test-build\",
              \"artifact_url\": \"${ARTIFACT_URL}\",
              \"artifact_token\": \"${{ secrets.GITHUB_TOKEN }}\",
              \"timestamp\": \"$(date -u +'%Y-%m-%dT%H:%M:%SZ')\"
            }"