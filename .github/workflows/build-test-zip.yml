name: Build Test ZIP

on:
  workflow_run:
    workflows:
      - Tests
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: build-test-zip-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Test ZIP
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build ZIP
        run: npm run build:zip

      - name: Install deploy tools
        run: sudo apt-get update && sudo apt-get install -y rsync unzip

      - name: Extract ZIP
        run: |
          rm -rf dist/share
          mkdir -p dist/share
          unzip -q dist/tsubakuro.zip -d dist/share

      - name: Share extracted ZIP with rsync
        env:
          RSYNC_HOST: ${{ secrets.RSYNC_HOST }}
          RSYNC_USER: ${{ secrets.RSYNC_USER }}
          RSYNC_DESTINATION: ${{ secrets.RSYNC_DESTINATION }}
          RSYNC_PORT: ${{ secrets.RSYNC_PORT }}
          RSYNC_SSH_PRIVATE_KEY: ${{ secrets.RSYNC_SSH_PRIVATE_KEY }}
          RSYNC_KNOWN_HOSTS: ${{ secrets.RSYNC_KNOWN_HOSTS }}
        run: |
          set -euo pipefail

          : "${RSYNC_HOST:?RSYNC_HOST secret is required}"
          : "${RSYNC_USER:?RSYNC_USER secret is required}"
          : "${RSYNC_DESTINATION:?RSYNC_DESTINATION secret is required}"
          : "${RSYNC_SSH_PRIVATE_KEY:?RSYNC_SSH_PRIVATE_KEY secret is required}"

          RSYNC_PORT="${RSYNC_PORT:-22}"

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$RSYNC_SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          if [ -n "${RSYNC_KNOWN_HOSTS:-}" ]; then
            printf '%s\n' "$RSYNC_KNOWN_HOSTS" > ~/.ssh/known_hosts
          else
            ssh-keyscan -p "$RSYNC_PORT" "$RSYNC_HOST" >> ~/.ssh/known_hosts
          fi
          chmod 600 ~/.ssh/known_hosts

          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_rsa -p ${RSYNC_PORT}" \
            dist/share/tsubakuro/ \
            "${RSYNC_USER}@${RSYNC_HOST}:${RSYNC_DESTINATION%/}/"
