name: Build Release ZIP

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-zip-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ZIP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run WordPress integration tests
        run: npm run test:wp

      - name: Stop wp-env
        if: always()
        run: npm run wp-env:stop

      - name: Build ZIP
        run: npm run build:zip

      - name: Upload latest ZIP artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: tsubakuro-latest
          path: dist/tsubakuro.zip
          retention-days: 30

      - name: Upload release ZIP artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: tsubakuro-${{ github.ref_name }}
          path: dist/tsubakuro.zip
          retention-days: 90

      - name: Attach ZIP to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/tsubakuro.zip
